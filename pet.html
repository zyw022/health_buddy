<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌宠 — Health Companion</title>
<style>
/* ============================================================
   Desktop Pet — Frameless Floating Window
   ============================================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bubble-bg: #FFF8E1;
  --text-primary: #333333;
}

body {
  background: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
    "Microsoft YaHei", "Helvetica Neue", sans-serif;
  width: 200px;
  height: 260px;
  overflow: hidden;
  user-select: none;
  -webkit-app-region: drag;
  cursor: grab;
}
body:active { cursor: grabbing; }

/* Drag handle — visible grab indicator at top */
.drag-handle {
  width: 100%; height: 26px;
  -webkit-app-region: drag;
  position: absolute; top: 0; left: 0;
  z-index: 20;
  display: flex; align-items: center; justify-content: center;
  gap: 4px;
  cursor: grab;
}
.drag-handle:active { cursor: grabbing; }
.drag-dot {
  width: 4px; height: 4px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
}

/* Pet Container */
.pet-container {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  position: relative;
  -webkit-app-region: drag;
}

/* Speech Bubble */
.pet-bubble {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  background: var(--bubble-bg);
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 11px; font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  max-width: 180px; text-align: center;
  -webkit-app-region: no-drag;
}
.pet-bubble.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-3px);
}
.pet-bubble::after {
  content: '';
  position: absolute; bottom: -6px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid var(--bubble-bg);
}

/* Pet Canvas */
.pet-canvas-wrap {
  width: 120px; height: 120px;
  cursor: pointer; position: relative;
  transition: transform 0.15s;
  -webkit-app-region: no-drag;
  display: flex; align-items: center; justify-content: center;
}
.pet-canvas-wrap:hover { transform: scale(1.08); }
.pet-canvas-wrap:active { transform: scale(0.92); }
.pet-canvas-wrap canvas {
  display: block;
  image-rendering: pixelated;
}

/* Shadow */
.pet-shadow {
  width: 60px; height: 8px;
  background: rgba(0,0,0,0.12);
  border-radius: 50%; margin-top: 2px;
  animation: shadow-pulse 3s ease-in-out infinite;
}
@keyframes shadow-pulse {
  0%,100% { transform: scale(1); opacity: 0.12; }
  50% { transform: scale(0.85); opacity: 0.08; }
}

/* Hover Action Buttons */
.pet-actions {
  display: flex; gap: 6px; margin-top: 4px;
  opacity: 0; transition: opacity 0.2s;
  -webkit-app-region: no-drag;
}
.pet-container:hover .pet-actions { opacity: 1; }
.pet-action-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 16px;
  background: rgba(255,255,255,0.85);
  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.pet-action-btn:hover { transform: scale(1.15); }
.pet-action-btn:active { transform: scale(0.9); }

/* Context Menu */
.pet-context-menu {
  position: fixed;
  background: white; border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  padding: 6px 0; min-width: 140px;
  z-index: 999; display: none; font-size: 13px;
  -webkit-app-region: no-drag;
}
.pet-context-menu.show { display: block; }
.pet-context-menu .menu-item {
  padding: 8px 16px; cursor: pointer;
  transition: background 0.1s;
  display: flex; align-items: center; gap: 8px;
}
.pet-context-menu .menu-item:hover { background: #F5F5F5; }
.pet-context-menu .divider {
  height: 1px; background: #E0E0E0; margin: 4px 0;
}

/* Action indicator */
.action-label {
  position: absolute; bottom: -14px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; color: rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.3);
  padding: 1px 6px; border-radius: 6px;
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}
.pet-canvas-wrap:hover .action-label { opacity: 1; }
</style>
</head>
<body>

<div class="pet-container" id="petContainer">
  <!-- Drag handle (top strip for window dragging) -->
  <div class="drag-handle">
    <span class="drag-dot"></span><span class="drag-dot"></span><span class="drag-dot"></span>
    <span class="drag-dot"></span><span class="drag-dot"></span>
  </div>

  <!-- Speech Bubble -->
  <div class="pet-bubble" id="petBubble">你好呀~</div>

  <!-- Pet Animation Canvas -->
  <div class="pet-canvas-wrap" id="petCharWrap" title="双击打开树屋 / 右键菜单">
    <canvas id="petCanvas" width="120" height="120"></canvas>
    <span class="action-label" id="actionLabel">动作6</span>
  </div>

  <!-- Shadow -->
  <div class="pet-shadow"></div>

  <!-- Hover Actions -->
  <div class="pet-actions">
    <button class="pet-action-btn" title="打开树屋" onclick="openTreehouse()">🏠</button>
    <button class="pet-action-btn" title="喝水" onclick="quickWater()">💧</button>
    <button class="pet-action-btn" title="心情" onclick="quickMood()">😊</button>
  </div>
</div>

<!-- Context Menu -->
<div class="pet-context-menu" id="contextMenu">
  <div class="menu-item" onclick="openTreehouse()">🏠 进入树屋</div>
  <div class="menu-item" onclick="showBubble('今天状态不错哦~')">💬 和小鸡说话</div>
  <div class="divider"></div>
  <div class="menu-item" onclick="switchAction(1)">🎬 动作1 - 提示</div>
  <div class="menu-item" onclick="switchAction(2)">🎬 动作2 - 聊天</div>
  <div class="menu-item" onclick="switchAction(3)">🎬 动作3</div>
  <div class="menu-item" onclick="switchAction(4)">🎬 动作4</div>
  <div class="menu-item" onclick="switchAction(5)">🎬 动作5</div>
  <div class="menu-item" onclick="switchAction(6)">🎬 动作6 (默认)</div>
  <div class="menu-item" onclick="switchAction(7)">🎬 动作7</div>
  <div class="divider"></div>
  <div class="menu-item" onclick="quitApp()">🚪 退出</div>
</div>

<script>
// ============================================================
// SPRITE ANIMATION ENGINE
// ============================================================

/** Animation configuration for all 7 actions */
const ACTION_CONFIG = {
  1: { name: '提示',   frames: 6, fps: 10 },
  2: { name: '聊天',   frames: 7, fps: 10 },
  3: { name: '动作3',  frames: 6, fps: 10 },
  4: { name: '动作4',  frames: 7, fps: 8  },
  5: { name: '动作5',  frames: 5, fps: 6  },
  6: { name: '默认',   frames: 5, fps: 8  },  // DEFAULT
  7: { name: '动作7',  frames: 5, fps: 8  },
};

/** Preloaded frame Image objects: frames[actionNum][frameIndex] */
const frames = {};  // { 1: [Image,Image,...], 2: [...], ... }

/** Current animation state */
let currentAction = 6;
let currentFrame = 0;
let animationId = null;
let lastFrameTime = 0;
let isPreloaded = false;

/**
 * Preload all animation frames from the sprite folder.
 * Returns a Promise that resolves when all images are loaded.
 */
function preloadAllFrames() {
  const promises = [];
  for (let action = 1; action <= 7; action++) {
    frames[action] = [];
    const cfg = ACTION_CONFIG[action];
    for (let i = 1; i <= cfg.frames; i++) {
      const img = new Image();
      const frameNum = String(i).padStart(2, '0');
      img.src = `animations/动作${action}/frame_${frameNum}.png`;
      frames[action].push(img);
      promises.push(new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = () => {
          console.warn(`Failed to load: 动作${action}/frame_${frameNum}.png`);
          resolve(); // Don't block on individual failures
        };
      }));
    }
  }
  return Promise.all(promises).then(() => { isPreloaded = true; });
}

/**
 * Switch to a different action animation.
 * @param {number} action - Action number (1-7)
 * @param {boolean} [temporary] - If true, revert to default action after one loop
 */
function switchAction(action, temporary = false) {
  if (!frames[action]) return;
  currentAction = action;
  currentFrame = 0;
  document.getElementById('actionLabel').textContent = `动作${action}`;
  console.log(`🎬 Switched to 动作${action} (${ACTION_CONFIG[action].name})`);

  if (temporary) {
    const cfg = ACTION_CONFIG[action];
    const duration = (cfg.frames / cfg.fps) * 1000;
    setTimeout(() => {
      if (currentAction === action) {
        switchAction(6); // Revert to default
      }
    }, duration);
  }
}

/**
 * Main animation loop using requestAnimationFrame.
 */
function animate(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;

  const cfg = ACTION_CONFIG[currentAction];
  const frameInterval = 1000 / cfg.fps;

  if (timestamp - lastFrameTime >= frameInterval) {
    // Advance frame (loop)
    currentFrame = (currentFrame + 1) % cfg.frames;
    lastFrameTime = timestamp;
    drawFrame();
  }

  animationId = requestAnimationFrame(animate);
}

/**
 * Draw the current frame onto the canvas.
 */
function drawFrame() {
  const canvas = document.getElementById('petCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const actionFrames = frames[currentAction];
  if (!actionFrames || !actionFrames[currentFrame]) return;

  const img = actionFrames[currentFrame];
  if (!img.complete) return;

  // Clear canvas (transparent)
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw frame centered, maintaining aspect ratio
  const scale = Math.min(canvas.width / img.naturalWidth, canvas.height / img.naturalHeight);
  const dw = img.naturalWidth * scale;
  const dh = img.naturalHeight * scale;
  const dx = (canvas.width - dw) / 2;
  const dy = (canvas.height - dh) / 2;

  ctx.drawImage(img, dx, dy, dw, dh);
}

// ============================================================
// PET INTERACTION
// ============================================================

function showBubble(msg, duration = 3000) {
  const bubble = document.getElementById('petBubble');
  bubble.textContent = msg;
  bubble.classList.add('show');
  clearTimeout(bubble._tid);
  bubble._tid = setTimeout(() => bubble.classList.remove('show'), duration);
}

function quickWater() {
  showBubble('记得喝水哦～💧');
  switchAction(1, true); // Brief alert animation
  if (window.electronAPI) {
    window.electronAPI.updatePetState({ action: 'water', cups: 1 });
  }
}

function quickMood() {
  showBubble('今天心情好吗？😊');
  switchAction(2, true); // Brief chat animation
}

function openTreehouse() {
  if (window.electronAPI) {
    window.electronAPI.openTreehouse();
  } else {
    showBubble('🏠 树屋功能需要 Electron 环境');
  }
}

function quitApp() {
  showBubble('拜拜～下次见！👋');
  if (window.electronAPI) {
    setTimeout(() => window.close(), 800);
  }
}

// ============================================================
// EVENT HANDLERS
// ============================================================

const petWrap = document.getElementById('petCharWrap');

// Double-click → open treehouse
petWrap.addEventListener('dblclick', (e) => {
  e.stopPropagation();
  openTreehouse();
});

// Single click → bounce + play action 2
petWrap.addEventListener('click', (e) => {
  e.stopPropagation();
  petWrap.style.transform = 'scale(1.12)';
  setTimeout(() => { petWrap.style.transform = ''; }, 150);
  switchAction(2, true);
  hideContextMenu();
});

// Right-click context menu
const contextMenu = document.getElementById('contextMenu');
petWrap.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  e.stopPropagation();
  contextMenu.style.left = e.clientX + 'px';
  contextMenu.style.top = e.clientY + 'px';
  contextMenu.classList.add('show');
});

document.addEventListener('click', hideContextMenu);
function hideContextMenu() { contextMenu.classList.remove('show'); }

// ============================================================
// IDLE MESSAGES
// ============================================================
const idleMessages = [
  '你好呀~', '今天天气不错 ☀️', '记得多喝水哦 💧',
  '起来活动一下吧！', '你工作好认真呀 👍',
  '休息一下，看看远方 🌿', '心情好就是最好的养生 ✨',
];
let idleIdx = 0;
setInterval(() => {
  idleIdx = (idleIdx + 1) % idleMessages.length;
  showBubble(idleMessages[idleIdx], 3000);
}, 20000);

// ============================================================
// ELECTRON IPC
// ============================================================
if (window.electronAPI) {
  window.electronAPI.onPetStateChanged?.((state) => {
    if (state?.message) showBubble(state.message);
    if (state?.action === 'treehouse-closed') {
      showBubble('欢迎回来～ 👋');
      switchAction(6);
    }
    if (state?.petAction) {
      switchAction(state.petAction, true);
    }
  });
}

// ============================================================
// WINDOW DRAGGING — Works on entire window including canvas
// Uses a 4px movement threshold: click stays click, drag moves window
// ============================================================
(function setupWindowDrag() {
  let dragging = false;
  let startX = 0;
  let startY = 0;
  let lastX = 0;
  let lastY = 0;
  const DRAG_THRESHOLD = 4; // px of movement before drag activates

  document.body.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return; // left button only

    // Only exclude pure action buttons (not the canvas)
    const target = e.target;
    if (target.closest('.pet-action-btn') ||
        target.closest('.pet-context-menu')) {
      return;
    }

    // Record position but don't start dragging yet
    startX = e.screenX;
    startY = e.screenY;
    lastX = e.screenX;
    lastY = e.screenY;
    dragging = false; // will become true after threshold
  });

  window.addEventListener('mousemove', (e) => {
    // If mousedown hasn't happened, ignore
    if (lastX === 0 && lastY === 0 && !dragging) return;

    // If not dragging yet, check threshold
    if (!dragging) {
      const dist = Math.hypot(e.screenX - startX, e.screenY - startY);
      if (dist < DRAG_THRESHOLD) return;
      // Threshold passed — activate drag
      dragging = true;
      document.body.style.cursor = 'grabbing';
      lastX = e.screenX;
      lastY = e.screenY;
      return;
    }

    const deltaX = e.screenX - lastX;
    const deltaY = e.screenY - lastY;
    lastX = e.screenX;
    lastY = e.screenY;

    if (deltaX === 0 && deltaY === 0) return;

    if (window.electronAPI && window.electronAPI.moveWindow) {
      window.electronAPI.moveWindow(deltaX, deltaY);
    }
  });

  window.addEventListener('mouseup', () => {
    dragging = false;
    startX = 0; startY = 0;
    lastX = 0; lastY = 0;
    document.body.style.cursor = 'grab';
  });

  document.body.addEventListener('mouseleave', () => {
    dragging = false;
    startX = 0; startY = 0;
    lastX = 0; lastY = 0;
    document.body.style.cursor = 'grab';
  });
})();

// ============================================================
// INIT
// ============================================================
async function init() {
  console.log('🐤 Loading sprite frames...');
  await preloadAllFrames();
  console.log('✅ All sprite frames loaded! Starting animation loop (动作6).');

  // Start animation loop with action 6
  switchAction(6);
  animationId = requestAnimationFrame(animate);

  // Initial greeting after a short delay
  setTimeout(() => showBubble(idleMessages[0], 3500), 1500);
}

init();
</script>
</body>
</html>
